<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REI Auto Parts · CMMS Manutenção (Gestão)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg:#0f172a; --bg2:#1e293b; --panel:#ffffff; --panel2:#f1f5f9;
    --ink:#0f172a; --muted:#64748b; --line:#e2e8f0;
    --brand:#0e7490; --brand2:#0891b2; --accent:#155e75;
    --ok:#16a34a; --warn:#d97706; --bad:#dc2626; --info:#2563eb;
    --mec:#7c3aed; --ele:#ea580c;
    --shadow:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.06);
    --shadow-lg:0 10px 25px rgba(15,23,42,.12);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;color:var(--ink);background:var(--panel2)}
  a{color:var(--brand)}
  button{font-family:inherit;cursor:pointer}
  .hidden{display:none!important}

  /* Layout */
  #app{display:flex;min-height:100vh}
  #sidebar{width:248px;background:linear-gradient(180deg,#0f172a,#152540);color:#cbd5e1;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:40;transition:transform .25s}
  #sidebar .brand{padding:16px 16px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
  #nav{padding:10px 10px;flex:1;overflow:auto}
  #nav .grp{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#64748b;padding:14px 12px 6px}
  .navlink{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:#cbd5e1;font-size:14px;text-decoration:none;margin:2px 0;border:0;background:none;width:100%;text-align:left}
  .navlink:hover{background:rgba(255,255,255,.06);color:#fff}
  .navlink.active{background:var(--brand);color:#fff;font-weight:600}
  .navlink .ic{width:18px;text-align:center;font-size:15px}
  .navlink .badge{margin-left:auto;background:var(--bad);color:#fff;border-radius:20px;font-size:11px;padding:1px 7px;font-weight:700}
  #sidebar .foot{padding:12px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#64748b}

  #main{flex:1;margin-left:248px;display:flex;flex-direction:column;min-width:0}
  #topbar{background:var(--panel);border-bottom:1px solid var(--line);padding:12px 22px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:30}
  #topbar h1{font-size:18px;margin:0;flex:1}
  #burger{display:none;background:none;border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:18px}
  #content{padding:22px;max-width:1280px;width:100%}

  /* Cards & generic */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:18px}
  .card h3{margin:0 0 14px;font-size:15px}
  .grid{display:grid;gap:16px}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .kpi .lbl{font-size:12.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .kpi .val{font-size:30px;font-weight:800;margin-top:6px;line-height:1}
  .kpi .sub{font-size:12px;color:var(--muted);margin-top:6px}
  .kpi .bar{position:absolute;left:0;top:0;bottom:0;width:5px}
  .kpi.k-open .bar{background:var(--info)} .kpi.k-exec .bar{background:var(--brand2)}
  .kpi.k-done .bar{background:var(--ok)} .kpi.k-late .bar{background:var(--bad)}
  .kpi.k-mttr .bar{background:var(--mec)} .kpi.k-back .bar{background:var(--warn)} .kpi.k-peca .bar{background:#d97706}

  .row{display:flex;gap:16px;flex-wrap:wrap}
  .col{flex:1;min-width:280px}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;color:var(--ink);padding:9px 14px;border-radius:9px;font-size:13.5px;font-weight:600}
  .btn:hover{background:var(--panel2)}
  .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
  .btn.primary:hover{background:var(--accent)}
  .btn.ok{background:var(--ok);border-color:var(--ok);color:#fff}
  .btn.warn{background:var(--warn);border-color:var(--warn);color:#fff}
  .btn.bad{background:var(--bad);border-color:var(--bad);color:#fff}
  .btn.sm{padding:6px 10px;font-size:12.5px}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* Tables */
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
  th{font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);background:var(--panel2);position:sticky;top:0}
  tbody tr:hover{background:#f8fafc;cursor:pointer}
  .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px;background:#fff}

  /* Badges */
  .tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .t-aberta{background:#dbeafe;color:#1e40af} .t-execucao{background:#cffafe;color:#0e7490}
  .t-aguardando_peca{background:#fef9c3;color:#854d0e} .t-concluida{background:#dcfce7;color:#166534}
  .t-cancelada{background:#f1f5f9;color:#475569} .t-late{background:#fee2e2;color:#991b1b}
  .t-mecanica{background:#ede9fe;color:#5b21b6} .t-eletrica{background:#ffedd5;color:#9a3412}
  .p-baixa{background:#f1f5f9;color:#475569}.p-media{background:#dbeafe;color:#1e40af}
  .p-alta{background:#fef3c7;color:#92400e}.p-urgente{background:#fee2e2;color:#991b1b}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block}

  /* Forms */
  label.f{display:block;font-size:12.5px;font-weight:600;color:#334155;margin:0 0 5px}
  .field{margin-bottom:14px}
  input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:14px;font-family:inherit;background:#fff}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand2);box-shadow:0 0 0 3px rgba(8,145,178,.12)}
  textarea{min-height:80px;resize:vertical}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
  .hint{font-size:12px;color:var(--muted);margin-top:4px}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;z-index:60;overflow:auto}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:760px;box-shadow:var(--shadow-lg);animation:pop .15s ease}
  .modal.wide{max-width:920px}
  @keyframes pop{from{transform:translateY(8px);opacity:.6}to{transform:none;opacity:1}}
  .modal .mh{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  .modal .mh h2{margin:0;font-size:17px;flex:1}
  .modal .mb{padding:22px;max-height:70vh;overflow:auto}
  .modal .mf{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
  .x{background:none;border:0;font-size:22px;color:var(--muted);line-height:1}

  /* Alert duplicado */
  .alert{border-radius:12px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start;font-size:13.5px}
  .alert.dup{background:#fef2f2;border:1.5px solid #fecaca;color:#7f1d1d}
  .alert .ai{font-size:22px;line-height:1}
  .alert.info{background:#eff6ff;border:1.5px solid #bfdbfe;color:#1e3a8a}

  /* Filters bar */
  .filters{display:flex;gap:10px;flex-wrap:wrap;align-items:end;margin-bottom:14px}
  .filters .field{margin:0;min-width:150px}
  .pesq-t tbody tr{cursor:pointer}
  .pesq-t tbody tr:hover{background:#e8f6fd}
  .suglist{position:absolute;z-index:60;left:0;right:0;top:100%;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 26px rgba(2,6,23,.14);max-height:290px;overflow:auto;margin-top:4px}
  .sugitem{padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--line)}
  .sugitem:last-child{border-bottom:0}
  .sugitem:hover{background:var(--panel2)}
  .filters input,.filters select{padding:8px 10px}

  /* Timeline */
  .timeline{list-style:none;padding:0;margin:0}
  .timeline li{position:relative;padding:0 0 14px 22px;border-left:2px solid var(--line)}
  .timeline li:last-child{border-color:transparent}
  .timeline li::before{content:"";position:absolute;left:-6px;top:2px;width:10px;height:10px;border-radius:50%;background:var(--brand2)}
  .timeline .tmeta{font-size:12px;color:var(--muted)}

  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 22px;font-size:14px}
  .detail-grid .dl{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .detail-grid .dv{font-weight:600;margin-bottom:8px}
  .empty{text-align:center;color:var(--muted);padding:40px 20px}
  .empty .big{font-size:40px}
  .chip-row{display:flex;gap:8px;flex-wrap:wrap}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 18px;border-radius:10px;box-shadow:var(--shadow-lg);z-index:80;font-size:14px;opacity:0;transition:opacity .2s,transform .2s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

  /* Marca / utilizador */
  .logo-pill{background:#fff;border-radius:9px;padding:6px 10px;line-height:0;display:inline-flex;align-items:center}
  .user-box{display:flex;align-items:center;gap:12px;font-size:13px}
  .user-box .who{text-align:right;line-height:1.25}
  .user-box .who b{font-size:14px}
  .user-box .av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--brand2),var(--mec));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
  .role-pill{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:20px}
  .rp-gestor{background:#cffafe;color:#0e7490}

  /* Cadastro de equipamento em abas */
  .eqtabs{display:flex;gap:2px;border-bottom:2px solid var(--line);margin-bottom:16px;flex-wrap:wrap}
  .eqtab{padding:9px 14px;border:0;background:none;font-size:13.5px;font-weight:700;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer}
  .eqtab:hover{color:var(--ink)}
  .eqtab.active{color:var(--brand);border-bottom-color:var(--brand)}
  .eqpane{display:none} .eqpane.active{display:block;animation:pop .12s ease}
  .form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 14px}
  @media(max-width:760px){.form-grid3{grid-template-columns:1fr}}
  .secnote{font-size:12.5px;color:var(--accent);background:#ecfeff;border:1px solid #cffafe;border-radius:8px;padding:8px 11px;margin-bottom:14px;display:flex;gap:8px;align-items:flex-start}
  .fldgroup-title{font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:4px 0 10px;border-bottom:1px solid var(--line);padding-bottom:6px}
  .qrbox{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
  .qrbox #eqQR{padding:10px;background:#fff;border:1px solid var(--line);border-radius:10px}

  /* Responsive */
  @media(max-width:900px){
    #sidebar{transform:translateX(-100%)}
    #sidebar.open{transform:none}
    #main{margin-left:0}
    #burger{display:block}
    .form-grid{grid-template-columns:1fr}
    .detail-grid{grid-template-columns:1fr}
  }

  /* Print da folha de OS */
  #printArea{display:none}
  @media print{
    body *{visibility:hidden}
    #printArea,#printArea *{visibility:visible}
    #printArea{display:block;position:absolute;left:0;top:0;width:100%;padding:0 6mm}
  }
  .sheet{font-size:12.5px;color:#000}
  .sheet h2{margin:0;font-size:18px}
  .sheet .sh{display:flex;justify-content:space-between;border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:10px}
  .sheet table{font-size:12px}
  .sheet th,.sheet td{border:1px solid #000;padding:6px}
  .sheet .blk{border:1px solid #000;min-height:90px;padding:6px;margin-top:4px}
  .sheet .sign{display:flex;gap:30px;margin-top:30px}
  .sheet .sign div{flex:1;border-top:1px solid #000;text-align:center;padding-top:6px}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="brand" id="brandBox"></div>
    <nav id="nav"></nav>
    <div class="foot">REI Auto Parts · CMMS Manutenção<br>Programa de Gestão · v13.0 (dados reais TOTVS) · <span id="yr"></span></div>
  </aside>

  <div id="main">
    <header id="topbar">
      <button id="burger" onclick="toggleSidebar()">☰</button>
      <h1 id="pageTitle">Painel</h1>
      <div class="user-box" id="userBox"></div>
    </header>
    <main id="content"></main>
  </div>
</div>

<div id="modalRoot"></div>
<div id="printArea"></div>
<div id="toast" class="toast"></div>

<script src="DB_REI_dados.js"></script>
<script>
/* ===================== ESTADO E PERSISTÊNCIA ===================== */
/* v5: base real do TOTVS carregada de DB_REI_dados.js (manter na mesma pasta).
   O localStorage guarda APENAS as alterações locais (OS novas/editadas, equipamentos
   editados, técnicos, numeração) — a base histórica fica no ficheiro de dados. */
const LS_KEY = "rei_cmms_v5_real";
let state = null;
let ORIG = new Map(); // snapshot da base pristine (para gravar só o que mudou)

function uid(){ return Math.random().toString(36).slice(2,9); }

const GALPOES={FF1:"Fundição de Ferro (fase II)",FF2:"Fundição de Ferro (VICK)",FF3:"Fundição de Ferro (FBO X)",FA1:"Fundição de Aço (fase IV)",FAL1:"Fundição de Alumínio",FM1:"Fundição Manual e Alumínio (fase III)",US1:"Usinagem",US2:"Usinagem",AL1:"Almoxarifado",RE1:"Recepção",CM1:"Comercial",SG1:"Segurança",VEI:"Veículos"};
function galpaoDoTag(tag){ const p=(tag||"").split(".")[0]; return GALPOES[p]||p||""; }

const EST_DB=["concluida","cancelada","aberta","aberta"];
const EST_DB_LBL=["Encerrada","Cancelada","Aberta Ordem","Aprovada"];

function expandDB(){
  const src=window.DB_REI||{equipamentos:[],ordens:[]};
  const FAM=src.familias||{};
  const eqs=src.equipamentos.map(r=>({id:"q_"+r[0],db:true,tag:r[0],tagN:r[6]||"",nome:r[1]||"",setor:galpaoDoTag(r[0]),area:(r[0]||"").split(".")[0],
    familia:r[2]||"",familiaNome:(FAM[r[2]]||r[2]||""),centroCusto:r[3]?String(r[3]):"",planejador:r[4]||"",tipoEquipto:r[5]||"",
    situacao:"Ativo",criticidade:"Y",status:"operando"}));
  const idsEq=new Set(eqs.map(e=>e.id));
  const catDe=new Map(eqs.map(e=>[e.id,tipoParaCategoria(e.tipoEquipto)||null]));
  const ords=src.ordens.map(r=>{
    const num=r[0],tag=r[1],desc=r[2],est=r[3],usu=r[4],dt=r[5];
    const eid=tag?(idsEq.has("q_"+tag)?"q_"+tag:"x:"+tag):null;
    const status=EST_DB[est]||"aberta";
    return {id:"d"+num,db:true,numero:String(num),equipamentoId:eid,solicitante:usu||"",
      tipo:"corretiva",prioridade:"media",categoria:status==="aberta"?null:(catDe.get(eid)||null),
      status,tecnicoId:null,prazo:null,descricaoProblema:desc||"(sem descrição)",
      dataAbertura:dt,dataInicio:null,dataConclusao:status==="concluida"?dt:null,
      servicoExecutado:"",pecas:"",tempoGastoHoras:null,paradaHoras:null,
      relacionadaA:null,observacoesGestor:"",
      historico:[{data:dt,evento:"OS importada do TOTVS · estado original: "+(EST_DB_LBL[est]||"?"),usuario:usu||"TOTVS"}]};
  });
  return {eqs,ords};
}

function save(){
  const changed=r=>!r.db||JSON.stringify(r)!==ORIG.get(r.id);
  const persist={tecnicoAtual:state.tecnicoAtual,proximoNumero:state.proximoNumero,tecnicos:state.tecnicos,
    equipamentos:state.equipamentos.filter(changed),ordens:state.ordens.filter(changed)};
  try{ localStorage.setItem(LS_KEY,JSON.stringify(persist)); }
  catch(e){ toast("⚠️ Armazenamento do navegador cheio — exporte um backup em Backup & Dados."); }
}

function load(){
  if(!window.DB_REI){ alert("⚠️ Ficheiro DB_REI_dados.js não encontrado.\nMantenha-o na mesma pasta deste HTML.\nO sistema vai abrir sem a base real."); }
  const {eqs,ords}=expandDB();
  normalizeEquipList(eqs);
  ORIG=new Map();
  eqs.forEach(e=>ORIG.set(e.id,JSON.stringify(e)));
  ords.forEach(o=>ORIG.set(o.id,JSON.stringify(o)));
  let persisted=null;
  const raw=localStorage.getItem(LS_KEY);
  if(raw){ try{ persisted=JSON.parse(raw); }catch(e){ persisted=null; } }
  const mapE=new Map(eqs.map(e=>[e.id,e]));
  const mapO=new Map(ords.map(o=>[o.id,o]));
  if(persisted){
    (persisted.equipamentos||[]).forEach(e=>mapE.set(e.id,e));
    (persisted.ordens||[]).forEach(o=>mapO.set(o.id,o));
  }
  state={perfil:"gestor",
    tecnicoAtual:(persisted&&persisted.tecnicoAtual)||"t1",
    proximoNumero:(persisted&&persisted.proximoNumero)||1,
    tecnicos:(persisted&&persisted.tecnicos&&persisted.tecnicos.length)?persisted.tecnicos:tecnicosPadrao(),
    equipamentos:[...mapE.values()],
    ordens:[...mapO.values()]};
  // Programa de gestão: acesso direto como Gestor (sem tela de login)
  state.currentUser = {perfil:"gestor", tecnicoId:null, nome:"Gestor da Manutenção"};
  _eqCache=new Map();
  normalizeEquip();
}

/* ---- Padrão de cadastro (estilo TOTVS CD0910) + melhorias ---- */
const SITUACOES=["Ativo","Suspenso","Vendido","Inutilizado"];
const TIPOS_EQUIP=["","Elétrico","Mecânico","Hidráulico","Pneumático","Eletrônico","Instrumental","Ferramental","Veículo","Operatriz","Outros","Outro"];
const CRIT={X:{label:"X — Crítico",sla:1,cls:"p-urgente"},Y:{label:"Y — Médio",sla:3,cls:"p-alta"},Z:{label:"Z — Baixo",sla:7,cls:"p-baixa"}};
function critTag(c){ const k=CRIT[c]; return k?`<span class="tag ${k.cls}" title="${k.label}">${c}</span>`:`<span class="tag p-baixa">—</span>`; }
function slaDias(c){ return CRIT[c]?CRIT[c].sla:null; }
function tipoParaCategoria(t){ if(!t)return ""; if(/el[eé]tric|eletr[oô]nic/i.test(t))return "eletrica"; if(/mec[âa]nic|hidr[áa]ulic|pneum[áa]tic/i.test(t))return "mecanica"; return ""; }
function normalizeEquip(){ normalizeEquipList(state.equipamentos||[]); }
function normalizeEquipList(list){
  (list||[]).forEach(e=>{
    const m={alta:"X",media:"Y",baixa:"Z"};
    if(m[e.criticidade]) e.criticidade=m[e.criticidade];
    if(!["X","Y","Z"].includes(e.criticidade)) e.criticidade="Y";
    if(e.tipoEquipto===undefined||e.tipoEquipto==="") e.tipoEquipto=/painel|el[eé]tric|inversor|motor|bateria|disjuntor|el[eé]tron/i.test((e.nome||"")+(e.tag||""))?"Elétrico":"Mecânico";
    const d={empresa:"REI Auto Parts Indústria e Comércio Ltda",bem:"",contaPatrimonial:"",estabelecimento:"200",grupoMaquina:"",familia:e.familia||"",planejador:"",situacao:"Ativo",dataAltSituacao:"",
      dataAquisicao:"",dataAtivacao:"",notaFiscal:"",serie:"",valorAquisicao:"",fornecedor:"",fabricante:"",assistTecnica:"",desenho:"",revisao:"",tipoContador:"",equipamentoProdutivo:true,calendario:"Produção",
      calcUtilizacao:"Histórico",tipoApontamento:"Contador",fatorConversao:"1,0000",rateio:"100,00",contador:0,intervaloPreventiva:0,ultPrevContador:0,imagem:"",observacoes:""};
    for(const k in d){ if(e[k]===undefined) e[k]=d[k]; }
    if(e.status===undefined) e.status="operando";
  });
}

const STATUS = {
  aberta:{label:"Aberta (aguardando triagem)", short:"Aberta"},
  execucao:{label:"Em execução", short:"Execução"},
  aguardando_peca:{label:"Aguardando peça", short:"Aguard. peça"},
  concluida:{label:"Concluída", short:"Concluída"},
  cancelada:{label:"Cancelada", short:"Cancelada"}
};
const ATIVAS = ["aberta","execucao","aguardando_peca"];
const PRIORIDADES = {baixa:"Baixa",media:"Média",alta:"Alta",urgente:"Urgente"};
const TIPOS = {corretiva:"Corretiva",preventiva:"Preventiva",preditiva:"Preditiva",melhoria:"Melhoria"};

/* ===================== HELPERS ===================== */
let _eqCache=new Map();
function equip(id){
  if(_eqCache.has(id)) return _eqCache.get(id);
  const f=state.equipamentos.find(e=>e.id===id);
  if(f){ _eqCache.set(id,f); return f; }
  const code=(typeof id==="string"&&id.indexOf("x:")===0)?id.slice(2):null;
  const fb={id:id||"",tag:code||"—",tagN:"",nome:code?"(local/setor sem cadastro)":"(sem equipamento)",setor:code?galpaoDoTag(code):"—",familia:"",familiaNome:"",criticidade:"Y",tipoEquipto:"",situacao:"—",status:"operando"};
  _eqCache.set(id,fb); return fb;
}
function tec(id){ return state.tecnicos.find(t=>t.id===id); }
function ordemById(id){ return state.ordens.find(o=>o.id===id); }
function isActive(o){ return ATIVAS.includes(o.status); }
function isOverdue(o){ return o.prazo && isActive(o) && o.prazo < todayStr(); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmt(dstr){ if(!dstr) return "—"; const p=dstr.split("-"); return p[2]+"/"+p[1]+"/"+p[0]; }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function nextNumero(){ const num="OS-2026-"+String(state.proximoNumero).padStart(4,"0"); state.proximoNumero++; return num; }
function catalogo(nome){ return (window.DB_REI&&window.DB_REI[nome])||[]; }
function catOpts(nome,sel){ return `<option value="">— selecione —</option>`+catalogo(nome).map(x=>`<option value="${x[0]}"${sel===x[0]?" selected":""}>${x[0]} — ${x[1]}</option>`).join(""); }
function catLbl(nome,cod){ if(!cod) return "—"; const it=catalogo(nome).find(x=>x[0]===cod); return it?(cod+" — "+it[1]):cod; }
function fmtDT(v){ if(!v) return "—"; const [d,h]=v.split("T"); return fmt(d)+(h?" "+h.slice(0,5):""); }
function addHist(o,evento,usuario){ o.historico.push({data:todayStr(),evento,usuario:usuario||"Gestor"}); }

function statusTag(o){
  if(isOverdue(o)) return `<span class="tag t-late">⏰ Atrasada</span>`;
  return `<span class="tag t-${o.status}">${STATUS[o.status].short}</span>`;
}
function catTag(c){ return c?`<span class="tag t-${c}">${CATEGORIAS[c]}</span>`:`<span class="tag t-cancelada">a definir</span>`; }
function prioTag(p){ return `<span class="tag p-${p}">${PRIORIDADES[p]}</span>`; }

function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2600); }

];
let currentView = "dashboard";

function buildNav(){
  const nav=document.getElementById("nav"); nav.innerHTML="";
  let pendingGrp=null;
  NAV.forEach(item=>{
    if(item.grp){ pendingGrp=item.grp; return; }
    if(!item.roles.includes(state.perfil)) return;
    if(pendingGrp){ const g=document.createElement("div");g.className="grp";g.textContent=pendingGrp;nav.appendChild(g);pendingGrp=null; }
    const b=document.createElement("button");
    b.className="navlink"+(currentView===item.id?" active":"");
    let badge=""; if(item.badge){const c=item.badge();if(c>0)badge=`<span class="badge">${c}</span>`;}
    b.innerHTML=`<span class="ic">${item.icon}</span><span>${item.label}</span>${badge}`;
    b.onclick=()=>{ currentView=item.id; closeSidebar(); render(); };
    nav.appendChild(b);
  });
}
function renderBrand(){
  const b=document.getElementById("brandBox"); if(!b)return;
  b.innerHTML=`<div class="logo-pill" id="brandLogo"></div><div style="margin-left:auto;font-size:18px" title="Brasil">🇧🇷</div>`;
  mountLogo("brandLogo",30);

const TITLES={dashboard:"Painel de Manutenção",ordens:"Ordens de Serviço",nova:"Registar Ordem de Serviço",triagem:"Triagem de Solicitações",equipamentos:"Equipamentos",tecnicos:"Equipa Técnica",relatorios:"Relatórios e Indicadores",config:"Backup & Dados"};

function render(){
  const allowed=NAV.find(n=>n.id===currentView);
  if(!allowed) currentView="dashboard";
  renderBrand(); renderUserBox(); buildNav();
  document.getElementById("pageTitle").textContent=TITLES[currentView]||"Painel";

/* ===================== DASHBOARD ===================== */
let charts={};
function destroyCharts(){ Object.values(charts).forEach(c=>c&&c.destroy()); charts={}; }

let dashPeriodo={ano:String(new Date().getFullYear()),mes:String(new Date().getMonth()+1).padStart(2,"0")}; // abre no mês atual
const MESES_LBL=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
function dashFiltrar(){ dashPeriodo={ano:val("dAno"),mes:val("dMes")}; render(); }
function dashLimpar(){ dashPeriodo={ano:"",mes:""}; render(); }
function dashMesAtual(){ const n=new Date(); dashPeriodo={ano:String(n.getFullYear()),mes:String(n.getMonth()+1).padStart(2,"0")}; render(); }
function dashAnoAtual(){ dashPeriodo={ano:String(new Date().getFullYear()),mes:""}; render(); }
function dashModo(){ const n=new Date(),a=String(n.getFullYear()),m=String(n.getMonth()+1).padStart(2,"0");
  if(dashPeriodo.ano===a&&dashPeriodo.mes===m) return "mes";
  if(dashPeriodo.ano===a&&!dashPeriodo.mes) return "ano";
  if(!dashPeriodo.ano&&!dashPeriodo.mes) return "geral";
  return ""; }
function irParaOrdensEquip(id){ filtros={busca:"",status:"",categoria:"",equip:id,setor:""}; ordensLimit=200; currentView="ordens"; render(); }
function viewDashboard(c){
  destroyCharts();
  const anos=[...new Set(state.ordens.map(o=>(o.dataAbertura||"").slice(0,4)).filter(Boolean))].sort();
  const periodoAtivo=!!(dashPeriodo.ano||dashPeriodo.mes);
  const O=state.ordens.filter(o=>{
    if(dashPeriodo.ano&&(o.dataAbertura||"").slice(0,4)!==dashPeriodo.ano)return false;
    if(dashPeriodo.mes&&(o.dataAbertura||"").slice(5,7)!==dashPeriodo.mes)return false;
    return true;
  });
  const abertas=O.filter(o=>o.status==="aberta").length;
  const exec=O.filter(o=>o.status==="execucao").length;
  const aguardPeca=O.filter(o=>o.status==="aguardando_peca").length;
  const concl=O.filter(o=>o.status==="concluida");
  const atrasadas=O.filter(isOverdue).length;
  const backlog=O.filter(isActive).length;
  const comTempo=concl.filter(o=>o.dataInicio&&o.dataConclusao);
  const mttr = comTempo.length? (comTempo.reduce((s,o)=>s+Math.max(daysBetween(o.dataInicio,o.dataConclusao),0)*24,0)/comTempo.length) : 0;
  const concComPrazo=concl.filter(o=>o.prazo&&o.dataConclusao);
  const noPrazo=concComPrazo.filter(o=>o.dataConclusao<=o.prazo).length;
  const taxaPrazo=concComPrazo.length? Math.round(noPrazo/concComPrazo.length*100):100;

  c.innerHTML=`
    <div class="card" style="margin-bottom:14px;padding:12px 14px">
      <div class="filters">
        <div class="field"><label class="f">Ano</label><select id="dAno" onchange="dashFiltrar()"><option value="">Todos</option>${anos.map(a=>`<option value="${a}"${dashPeriodo.ano===a?" selected":""}>${a}</option>`).join("")}</select></div>
        <div class="field"><label class="f">Mês</label><select id="dMes" onchange="dashFiltrar()"><option value="">Todos</option>${MESES_LBL.map((m,i)=>{const v=String(i+1).padStart(2,"0");return `<option value="${v}"${dashPeriodo.mes===v?" selected":""}>${m}</option>`;}).join("")}</select></div>
        <div style="display:flex;gap:6px;align-items:flex-end">
          <button class="btn sm ${dashModo()==="mes"?"primary":""}" onclick="dashMesAtual()" title="Indicadores do mês corrente">Mês atual</button>
          <button class="btn sm ${dashModo()==="ano"?"primary":""}" onclick="dashAnoAtual()" title="Acumulado do ano corrente">Ano atual</button>
          <button class="btn sm ${dashModo()==="geral"?"primary":""}" onclick="dashLimpar()" title="Histórico completo, sem filtro">Geral</button>
        </div>
        <span class="hint" style="align-self:center"><b>${O.length}</b> OS ${periodoAtivo?"no período selecionado":"no histórico completo"} — todos os indicadores abaixo respeitam este filtro</span>
      </div>
    </div>
    <div class="grid kpis" style="margin-bottom:18px">
      <div class="kpi k-open" style="cursor:pointer" title="Ver OS abertas" onclick="irParaOrdens('aberta')"><div class="bar"></div><div class="lbl">Abertas ›</div><div class="val">${abertas}</div><div class="sub">aguardando triagem</div></div>
      <div class="kpi k-exec" style="cursor:pointer" title="Ver OS em execução" onclick="irParaOrdens('execucao')"><div class="bar"></div><div class="lbl">Em execução ›</div><div class="val">${exec}</div><div class="sub">atribuídas e em andamento</div></div>
      <div class="kpi k-peca" style="cursor:pointer" title="Ver OS aguardando peça" onclick="irParaOrdens('aguardando_peca')"><div class="bar"></div><div class="lbl">Aguard. peça ›</div><div class="val">${aguardPeca}</div><div class="sub">paradas por material</div></div>
      <div class="kpi k-late" style="cursor:pointer" title="Ver OS atrasadas" onclick="irParaOrdens('atrasada')"><div class="bar"></div><div class="lbl">Atrasadas ›</div><div class="val">${atrasadas}</div><div class="sub">prazo vencido</div></div>
      <div class="kpi k-done" style="cursor:pointer" title="Ver OS concluídas" onclick="irParaOrdens('concluida')"><div class="bar"></div><div class="lbl">Concluídas ›</div><div class="val">${concl.length}</div><div class="sub">${periodoAtivo?"no período":"total histórico"}</div></div>
      <div class="kpi k-back" style="cursor:pointer" title="Ver OS ativas (backlog)" onclick="irParaOrdens('ativas')"><div class="bar"></div><div class="lbl">Backlog ›</div><div class="val">${backlog}</div><div class="sub">OS ativas em aberto</div></div>
      <div class="kpi k-mttr"><div class="bar"></div><div class="lbl">MTTR médio</div><div class="val">${mttr.toFixed(1)}h</div><div class="sub">tempo médio de reparo</div></div>
    </div>
    <div class="row" style="margin-bottom:16px">
      <div class="col card"><h3>Tendência ${dashPeriodo.ano?"("+dashPeriodo.ano+")":"(últimos 6 meses)"}: abertas vs concluídas</h3><canvas id="chTrend" height="120"></canvas></div>
    </div>
    <div class="row" style="margin-bottom:16px">
      <div class="col card"><h3>Por situação</h3><canvas id="chStatus" height="170"></canvas></div>
      <div class="col card"><h3>Por equipa</h3><canvas id="chEquipe" height="170"></canvas></div>
      <div class="col card"><h3>Cumprimento de prazo</h3>
        <div style="display:flex;align-items:center;gap:18px">
          <div style="width:150px;height:150px;position:relative;flex:0 0 auto"><canvas id="chPrazo"></canvas></div>
          <div><div style="font-size:34px;font-weight:800;color:var(--ok)">${taxaPrazo}%</div>
          <div class="sub" style="color:var(--muted);font-size:13px">${noPrazo} de ${concComPrazo.length} concluídas no prazo</div></div>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col card"><h3>Top equipamentos por nº de OS <span class="hint" style="font-weight:400;font-size:12px">— clique na barra para abrir as OS do equipamento</span></h3><canvas id="chEquip" height="160"></canvas></div>
      <div class="col card">
        <h3>⏰ OS atrasadas — ação necessária</h3>
        <div id="lateList"></div>
      </div>
    </div>`;

  const late=O.filter(isOverdue).sort((a,b)=>a.prazo.localeCompare(b.prazo));
  document.getElementById("lateList").innerHTML = late.length? `<div class="table-wrap"><table><thead><tr><th>OS</th><th>Equipamento</th><th>Prazo</th><th>Resp.</th></tr></thead><tbody>${late.map(o=>`<tr onclick="openOrdem('${o.id}')"><td><b>${o.numero}</b></td><td>${equip(o.equipamentoId).nome}</td><td><span class="tag t-late">${fmt(o.prazo)}</span></td><td>${o.tecnicoId?tec(o.tecnicoId).nome:"—"}</td></tr>`).join("")}</tbody></table></div>` : `<div class="empty"><div class="big">✅</div>Nenhuma OS atrasada. Bom trabalho!</div>`;

  charts.status=new Chart(document.getElementById("chStatus"),{type:"doughnut",
    data:{labels:["Aberta","Execução","Aguard. peça","Concluída","Cancelada"],
      datasets:[{data:["aberta","execucao","aguardando_peca","concluida","cancelada"].map(s=>O.filter(o=>o.status===s).length),
      backgroundColor:["#2563eb","#0891b2","#d97706","#16a34a","#94a3b8"]}]},
    options:{plugins:{legend:{position:"bottom",labels:{boxWidth:12,font:{size:11}}}}}});

  charts.equipe=new Chart(document.getElementById("chEquipe"),{type:"bar",
    data:{labels:["Mecânica","Elétrica","A definir"],
      datasets:[{label:"OS",data:[O.filter(o=>o.categoria==="mecanica").length,O.filter(o=>o.categoria==="eletrica").length,O.filter(o=>!o.categoria).length],
      backgroundColor:["#7c3aed","#ea580c","#cbd5e1"]}]},
    options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}});

  charts.prazo=new Chart(document.getElementById("chPrazo"),{type:"doughnut",
    data:{labels:["No prazo","Fora do prazo"],datasets:[{data:[noPrazo,concComPrazo.length-noPrazo],backgroundColor:["#16a34a","#dc2626"]}]},
    options:{cutout:"68%",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});

  const cont={}; O.forEach(o=>{if(!o.equipamentoId)return;cont[o.equipamentoId]=(cont[o.equipamentoId]||0)+1;});
  const top=Object.entries(cont).map(([id,v])=>({id,tag:equip(id).tag,nomeEq:equip(id).nome,v})).sort((a,b)=>b.v-a.v).slice(0,8);
  charts.equip=new Chart(document.getElementById("chEquip"),{type:"bar",
    data:{labels:top.map(t=>t.tag),datasets:[{label:"Nº de OS",data:top.map(t=>t.v),backgroundColor:"#0e7490"}]},
    options:{indexAxis:"y",
      onClick:(ev,items)=>{if(items&&items.length){const t=top[items[0].index];if(t)irParaOrdensEquip(t.id);}},
      onHover:(ev,items)=>{const tg=ev&&ev.native&&ev.native.target;if(tg)tg.style.cursor=(items&&items.length)?"pointer":"default";},
      plugins:{legend:{display:false},tooltip:{callbacks:{title:(it)=>{const t=top[it[0].dataIndex];return t.tag+" — "+t.nomeEq;},afterLabel:()=>"🔎 clique para ver as OS"}}},
      scales:{x:{beginAtZero:true,ticks:{precision:0}}}}});

  const months=[]; const now=new Date();
  if(dashPeriodo.ano){
    const y=+dashPeriodo.ano; const lastM=(y===now.getFullYear())?now.getMonth()+1:12;
    for(let mth=1;mth<=lastM;mth++){const dt=new Date(y,mth-1,1);months.push({key:dashPeriodo.ano+"-"+String(mth).padStart(2,"0"),label:dt.toLocaleDateString("pt-BR",{month:"short"})});}
  }else{
    for(let i=5;i>=0;i--){const dt=new Date(now.getFullYear(),now.getMonth()-i,1);months.push({key:dt.toISOString().slice(0,7),label:dt.toLocaleDateString("pt-BR",{month:"short"})+"/"+String(dt.getFullYear()).slice(2)});}
  }
  const OTrend=state.ordens.filter(o=>!dashPeriodo.ano||(o.dataAbertura||"").slice(0,4)===dashPeriodo.ano);
  const abertasM=months.map(m=>OTrend.filter(o=>o.dataAbertura&&o.dataAbertura.slice(0,7)===m.key).length);
  const conclM=months.map(m=>OTrend.filter(o=>o.dataConclusao&&o.dataConclusao.slice(0,7)===m.key).length);
  charts.trend=new Chart(document.getElementById("chTrend"),{type:"line",
    data:{labels:months.map(m=>m.label),datasets:[
      {label:"Abertas",data:abertasM,borderColor:"#2563eb",backgroundColor:"rgba(37,99,235,.1)",tension:.3,fill:true},
      {label:"Concluídas",data:conclM,borderColor:"#16a34a",backgroundColor:"rgba(22,163,74,.1)",tension:.3,fill:true}]},
    options:{plugins:{legend:{position:"bottom"}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}});
}

window.pqRender=function(){
  const q=(val("pqQ")||"").toLowerCase();
  const ord=val("pqOrd")||"tagN";
  const st=filtros.setor;
  const base=st?state.equipamentos.filter(e=>e.setor===st):state.equipamentos;
  let list=q?base.filter(e=>((e.tagN||"")+" "+(e.tag||"")+" "+(e.nome||"")+" "+(e.setor||"")+" "+(e.familia||"")+" "+(e.familiaNome||"")).toLowerCase().includes(q)):base.slice();
  const soNum=/^\d+$/.test(q);
  const qn=soNum?String(parseInt(q,10)):"";
  const ehPref=e=>soNum?(!!e.tagN&&(e.tagN.replace(/^0+/,"")).indexOf(qn)===0):((e.tag||"").toLowerCase().indexOf(q)===0);
  const exato=e=>soNum&&!!e.tagN&&e.tagN.replace(/^0+/,"")===qn;
  const cmp=(a,b)=>{
    if(ord==="tagN"){const x=a.tagN?parseInt(a.tagN,10):1e9,y=b.tagN?parseInt(b.tagN,10):1e9;return x-y||(a.tag||"").localeCompare(b.tag||"");}
    const key=(ord==="nome")?"nome":"tag";return (a[key]||"").localeCompare(b[key]||"");
  };
  const pref=q?list.filter(ehPref):[];
  const rest=q?list.filter(e=>!ehPref(e)):list;
  pref.sort((a,b)=>((exato(a)?0:1)-(exato(b)?0:1))||cmp(a,b));rest.sort(cmp);
  list=pref.concat(rest);
  const MAX=150;
  const rowsEl=document.getElementById("pqRows"); if(!rowsEl) return;
  rowsEl.innerHTML=list.slice(0,MAX).map(e=>`<tr onclick="pqEscolher('${e.id}')"><td style="white-space:nowrap"><b>${e.tagN||"—"}</b></td><td style="white-space:nowrap">${e.tag}</td><td>${e.nome}</td><td>${e.setor||"—"}</td><td>${e.familiaNome||e.familia||"—"}</td></tr>`).join("")||`<tr><td colspan="5" style="color:var(--muted);padding:16px">Nenhum equipamento encontrado.</td></tr>`;
  document.getElementById("pqInfo").textContent=list.length+" equipamento(s)"+(st?" no setor "+st:"")+(list.length>MAX?" — mostrando os primeiros "+MAX+", refine a busca":"");
};

function filtraOrdens(){
  return state.ordens.filter(o=>{
    if(filtros.busca){const e=equip(o.equipamentoId);const s=(o.numero+" "+o.descricaoProblema+" "+(o.solicitante||"")+" "+(o.servicoExecutado||"")+" "+e.tag+" "+(e.tagN||"")+" "+e.nome+" "+(e.setor||"")+" "+(e.familiaNome||e.familia||"")).toLowerCase();if(!s.includes(filtros.busca))return false;}
    if(filtros.setor){if(equip(o.equipamentoId).setor!==filtros.setor)return false;}
    if(filtros.status==="atrasada"){if(!isOverdue(o))return false;}
    else if(filtros.status==="ativas"){if(!isActive(o))return false;}
    else if(filtros.status==="emexec"){if(!(o.status==="execucao"||o.status==="aguardando_peca"))return false;}
    else if(filtros.status){if(o.status!==filtros.status)return false;}
    if(filtros.categoria==="none"){if(o.categoria)return false;} else if(filtros.categoria){if(o.categoria!==filtros.categoria)return false;}
    if(filtros.equip&&o.equipamentoId!==filtros.equip)return false;
    return true;
  }).sort((a,b)=>b.dataAbertura.localeCompare(a.dataAbertura)||b.numero.localeCompare(a.numero));

/* ===================== PREVENTIVA POR CONTADOR (melhoria) ===================== */
function preventivasDevidas(){
  return state.equipamentos.filter(e=>{
    const it=e.intervaloPreventiva||0; if(it<=0) return false;
    if(((e.contador||0)-(e.ultPrevContador||0))<it) return false;
    return !state.ordens.some(o=>o.equipamentoId===e.id && o.tipo==="preventiva" && isActive(o));
  });
}
function gerarPreventivas(){
  const lista=preventivasDevidas();
  if(!lista.length){toast("Nenhuma preventiva por contador devida.");return;}
  if(!confirm("Gerar "+lista.length+" OS preventiva(s) por contador?")) return;
  lista.forEach(e=>{
    const o={id:uid(),numero:nextNumero(),equipamentoId:e.id,solicitante:"Sistema (preventiva por contador)",
      descricaoProblema:"Manutenção preventiva por contador — equipamento atingiu "+(e.contador||0)+"h (intervalo "+e.intervaloPreventiva+"h).",
      tipo:"preventiva",prioridade:"media",categoria:tipoParaCategoria(e.tipoEquipto)||null,status:"aberta",tecnicoId:null,prazo:null,
      dataAbertura:todayStr(),dataInicio:null,dataConclusao:null,servicoExecutado:"",pecas:"",tempoGastoHoras:null,paradaHoras:null,
      relacionadaA:null,observacoesGestor:"",historico:[{data:todayStr(),evento:"OS preventiva gerada automaticamente (contador)",usuario:"Sistema"}]};
    state.ordens.push(o); e.ultPrevContador=e.contador||0;
  });
  save();toast("✅ "+lista.length+" preventiva(s) gerada(s).");render();
}

/* ===================== RELATÓRIOS ===================== */
let rep={equip:"",ini:"",fim:""};
function viewRelatorios(c){
  destroyCharts();
  const hoje=todayStr();const ini=rep.ini||(new Date(Date.now()-90*86400000)).toISOString().slice(0,10);
  c.innerHTML=`
  <div class="card" style="margin-bottom:16px">
    <h3>📈 Histórico de manutenção por equipamento e período</h3>
    <div class="filters">
      <div class="field"><label class="f">Equipamento</label><select id="rEquip"><option value="">Todos</option>${state.equipamentos.map(e=>`<option value="${e.id}">${e.tag} · ${e.nome}</option>`).join("")}</select></div>
      <div class="field"><label class="f">De</label><input type="date" id="rIni" value="${rep.ini||ini}"></div>
      <div class="field"><label class="f">Até</label><input type="date" id="rFim" value="${rep.fim||hoje}"></div>
      <button class="btn primary" onclick="gerarRelatorio()">Gerar</button>
      <button class="btn" onclick="exportCSV()">⬇ Exportar CSV</button>
    </div>
    <div id="repResumo"></div>
  </div>
  <div id="repResultado"></div>`;
  document.getElementById("rEquip").value=rep.equip;
  gerarRelatorio();
}
function relatorioDados(){
  rep={equip:val("rEquip"),ini:val("rIni"),fim:val("rFim")};
  return state.ordens.filter(o=>{
    if(rep.equip&&o.equipamentoId!==rep.equip)return false;
    const dt=o.dataAbertura;
    if(rep.ini&&dt<rep.ini)return false;
    if(rep.fim&&dt>rep.fim)return false;
    return true;
  }).sort((a,b)=>a.dataAbertura.localeCompare(b.dataAbertura));
}
function gerarRelatorio(){
  const list=relatorioDados();
  const concl=list.filter(o=>o.status==="concluida");
  const totalParada=list.reduce((s,o)=>s+(o.paradaHoras||0),0);
  const totalHoras=list.reduce((s,o)=>s+(o.tempoGastoHoras||0),0);
  document.getElementById("repResumo").innerHTML=`<div class="grid kpis" style="margin-top:8px">
    <div class="kpi k-open"><div class="bar"></div><div class="lbl">OS no período</div><div class="val">${list.length}</div></div>
    <div class="kpi k-done"><div class="bar"></div><div class="lbl">Concluídas</div><div class="val">${concl.length}</div></div>
    <div class="kpi k-back"><div class="bar"></div><div class="lbl">Horas trabalhadas</div><div class="val">${totalHoras.toFixed(1)}h</div></div>
    <div class="kpi k-late"><div class="bar"></div><div class="lbl">Horas de parada</div><div class="val">${totalParada.toFixed(0)}h</div></div>
  </div>`;
  const r=document.getElementById("repResultado");
  if(!list.length){r.innerHTML=`<div class="card empty"><div class="big">🔍</div>Nenhuma manutenção registada para este filtro.</div>`;return;}
  const capped=list.slice(0,500);
  r.innerHTML=`<div class="card"><h3>Detalhe (${fmt(rep.ini)} a ${fmt(rep.fim)})${list.length>500?` — mostrando 500 de ${list.length} (use o CSV para o total)`:""}</h3><div class="table-wrap"><table>
    <thead><tr><th>OS</th><th>Data</th><th>Equipamento</th><th>Tipo</th><th>Categoria</th><th>Problema / Serviço executado</th><th>Responsável</th><th>Horas</th><th>Situação</th></tr></thead><tbody>
    ${capped.map(o=>`<tr onclick="openOrdem('${o.id}')"><td><b>${o.numero}</b></td><td>${fmt(o.dataAbertura)}</td><td>${equip(o.equipamentoId).tag}</td><td>${TIPOS[o.tipo]}</td><td>${catTag(o.categoria)}</td>
      <td style="max-width:300px"><b>P:</b> ${o.descricaoProblema.slice(0,70)}${o.servicoExecutado?`<br><b>S:</b> ${o.servicoExecutado.slice(0,80)}`:""}</td>
      <td>${o.tecnicoId?tec(o.tecnicoId).nome:"—"}</td><td>${o.tempoGastoHoras?o.tempoGastoHoras+"h":"—"}</td><td>${statusTag(o)}</td></tr>`).join("")}
  </tbody></table></div></div>`;
}
function exportCSV(){
  const list=relatorioDados();
  const head=["Numero","DataAbertura","DataConclusao","Equipamento_TAG","Equipamento_Nome","Setor","Tipo","Categoria","Prioridade","Situacao","Solicitante","Responsavel","Problema","ServicoExecutado","Pecas","HorasTrabalho","HorasParada","ParadaEm","RetornoEm","Sintoma","Causa","Intervencao","Prazo"];
  const rows=list.map(o=>{const e=equip(o.equipamentoId);const t=o.tecnicoId?tec(o.tecnicoId).nome:"";return [o.numero,o.dataAbertura,o.dataConclusao||"",e.tag,e.nome,e.setor,TIPOS[o.tipo],o.categoria?CATEGORIAS[o.categoria]:"",PRIORIDADES[o.prioridade],STATUS[o.status].short,o.solicitante||"",t,o.descricaoProblema,o.servicoExecutado||"",o.pecas||"",o.tempoGastoHoras||"",o.paradaHoras||"",o.paradaEm||"",o.retornoEm||"",o.sintoma?catLbl("sintomas",o.sintoma):"",o.causa?catLbl("causas",o.causa):"",o.intervencao?catLbl("intervencoes",o.intervencao):"",o.prazo||""].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(";");});
  const csv="﻿"+head.join(";")+"\n"+rows.join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="relatorio_manutencao.csv";a.click();
  toast("CSV exportado ("+list.length+" linhas).");
}

function importJSON(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.ordens||!d.equipamentos)throw 0;state=d;state.currentUser={perfil:"gestor",tecnicoId:null,nome:"Gestor da Manutenção"};state.perfil="gestor";save();toast("Backup importado!");render();}catch(e){toast("Arquivo inválido.");}};r.readAsText(f);}

    <div class="field" style="margin-top:14px"><div class="dl">Problema reportado</div><div style="background:var(--panel2);border-radius:8px;padding:10px;margin-top:4px">${o.descricaoProblema}</div></div>
    ${o.observacoesGestor?`<div class="field"><div class="dl">Observações do gestor</div><div style="background:#fffbeb;border-radius:8px;padding:10px;margin-top:4px">${o.observacoesGestor}</div></div>`:""}
    ${o.servicoExecutado?`<div class="field"><div class="dl">Serviço executado</div><div style="background:#f0fdf4;border-radius:8px;padding:10px;margin-top:4px">${o.servicoExecutado}<br><span class="hint">Peças: ${o.pecas||"—"} · Tempo: ${o.tempoGastoHoras||"—"}h · Parada: ${o.paradaHoras||"—"}h${o.paradaEm?` (${fmtDT(o.paradaEm)} → ${fmtDT(o.retornoEm)})`:""}</span></div></div>`:""}
    ${(o.sintoma||o.causa||o.intervencao)?`<div class="detail-grid" style="margin-top:10px">
      <div><div class="dl">Sintoma</div><div class="dv" style="font-size:13px">${catLbl("sintomas",o.sintoma)}</div></div>
      <div><div class="dl">Causa</div><div class="dv" style="font-size:13px">${catLbl("causas",o.causa)}</div></div>
      <div><div class="dl">Intervenção</div><div class="dv" style="font-size:13px">${catLbl("intervencoes",o.intervencao)}</div></div>
    </div>`:""}
    <div class="field"><div class="dl">Histórico</div><ul class="timeline" style="margin-top:8px">${o.historico.map(h=>`<li><div>${h.evento}</div><div class="tmeta">${fmt(h.data)} · ${h.usuario}</div></li>`).join("")}</ul></div>
  `;
  const acoes=[];
  acoes.push({label:"🖨 Imprimir folha",cls:"",fn:()=>{imprimirOS(o.id);return false;}});
  if(o.status==="aberta") acoes.push({label:"Triar e atribuir",cls:"primary",fn:()=>{triarModal(o.id);return false;}});
  if(o.status==="execucao"||o.status==="aguardando_peca"){acoes.push({label:"Editar atribuição",cls:"",fn:()=>{triarModal(o.id);return false;}});}
  if(o.status==="execucao") acoes.push({label:"⏸ Aguardando peça",cls:"warn",fn:()=>{o.status="aguardando_peca";addHist(o,"Aguardando peça");save();render();return true;}});
  if(o.status==="aguardando_peca") acoes.push({label:"▶ Retomar execução",cls:"",fn:()=>{o.status="execucao";addHist(o,"Execução retomada");save();render();return true;}});
  if(o.status==="execucao"||o.status==="aguardando_peca") acoes.push({label:"✅ Concluir / preencher",cls:"ok",fn:()=>{concluirModal(o.id);return false;}});
  if(isActive(o)) acoes.push({label:"Cancelar OS",cls:"bad",fn:()=>{if(confirm("Cancelar esta OS?")){o.status="cancelada";addHist(o,"OS cancelada pelo gestor");save();toast("OS cancelada.");render();return true;}return false;}});
  openModal(o.numero+" — Ordem de Serviço",body,acoes,"wide");
}

function triarModal(id){
  const o=ordemById(id);
  const tecOpts=(eq)=>state.tecnicos.filter(t=>t.equipe===eq).map(t=>`<option value="${t.id}">${t.nome}${t.lider?" (líder)":""}</option>`).join("");
  openModal("Triagem — "+o.numero,`
    <div class="alert info" style="margin-bottom:14px"><div class="ai">🔎</div><div>A <b>equipa</b> e o <b>prazo</b> já vêm sugeridos pelo cadastro do equipamento (tipo e criticidade). Confira e ajuste se necessário.</div></div>
    <div class="field"><div class="dl">Problema</div><div style="background:var(--panel2);padding:8px;border-radius:8px;margin-top:4px">${o.descricaoProblema}</div></div>
    <div class="form-grid">
      <div class="field"><label class="f">Categoria / equipa *</label><select id="trCat" onchange="trUpdateTec()"><option value="">— selecione —</option><option value="mecanica">Mecânica</option><option value="eletrica">Elétrica</option></select></div>
      <div class="field"><label class="f">Técnico responsável</label><select id="trTec"><option value="">— atribuir depois —</option></select></div>
      <div class="field"><label class="f">Prioridade</label><select id="trPrio"><option value="baixa">Baixa</option><option value="media">Média</option><option value="alta">Alta</option><option value="urgente">Urgente</option></select></div>
      <div class="field"><label class="f">Prazo de execução</label><input type="date" id="trPrazo" value="${o.prazo||""}"></div>
    </div>
    <div class="field"><label class="f">Observações do gestor</label><textarea id="trObs" placeholder="Orientações, segurança, materiais...">${o.observacoesGestor||""}</textarea></div>
  `,[{label:"Confirmar triagem",cls:"primary",fn:()=>{
      const cat=val("trCat");if(!cat){toast("Selecione a categoria.");return false;}
      o.categoria=cat;o.prioridade=val("trPrio");o.prazo=val("trPrazo")||null;o.observacoesGestor=val("trObs");
      const tid=val("trTec");o.tecnicoId=tid||null;
      if(o.status==="aberta"){o.status="execucao";if(!o.dataInicio&&tid)o.dataInicio=todayStr();}
      addHist(o,"Triada → "+CATEGORIAS[cat]+(tid?" · "+tec(tid).nome:"")+(o.prazo?" · prazo "+fmt(o.prazo):""));
      save();toast("Triagem registada.");render();return true;
    }}]);
  const _eqp=equip(o.equipamentoId);
  const _catSug=o.categoria||tipoParaCategoria(_eqp&&_eqp.tipoEquipto);
  document.getElementById("trCat").value=_catSug||"";
  document.getElementById("trPrio").value=o.prioridade;
  if(!o.prazo && _eqp){ const _s=slaDias(_eqp.criticidade); if(_s){ const _d=new Date(); _d.setDate(_d.getDate()+_s); const _p=document.getElementById("trPrazo"); if(_p&&!_p.value) _p.value=_d.toISOString().slice(0,10); } }
  window._trMakeTec=(eq,sel)=>{document.getElementById("trTec").innerHTML=`<option value="">— atribuir depois —</option>`+tecOpts(eq);if(sel)document.getElementById("trTec").value=sel;};
  window.trUpdateTec=()=>{const eq=val("trCat");if(eq)window._trMakeTec(eq,"");};
  if(_catSug)window._trMakeTec(_catSug,o.tecnicoId||"");
}

window.calcParada=function(){
  const a=val("cParou"),b=val("cVoltou");
  if(a&&b){ const h=(new Date(b)-new Date(a))/3600000; if(h>=0){ document.getElementById("cParada").value=Math.round(h*2)/2; } }
};
function concluirModal(id){
  const o=ordemById(id);
  openModal("Concluir OS — "+o.numero,`
    <div class="alert info" style="margin-bottom:14px"><div class="ai">📝</div><div>Preencha o que foi realizado. Esta é a folha que o técnico entrega ao gestor.</div></div>
    <div class="field"><label class="f">Serviço executado *</label><textarea id="cServ" placeholder="Etapas da execução · recursos/materiais usados · desafios ou erro operacional · resultado final">${o.servicoExecutado||""}</textarea></div>
    <div class="form-grid">
      <div class="field"><label class="f">Sintoma (o que a máquina apresentou)</label><select id="cSint">${catOpts("sintomas",o.sintoma)}</select></div>
      <div class="field"><label class="f">Causa (por que aconteceu)</label><select id="cCausa">${catOpts("causas",o.causa)}</select></div>
    </div>
    <div class="field"><label class="f">Intervenção (o que foi feito para resolver)</label><select id="cInterv">${catOpts("intervencoes",o.intervencao)}</select></div>
    <div class="form-grid">
      <div class="field"><label class="f">Máquina parou em (data e hora)</label><input type="datetime-local" id="cParou" value="${o.paradaEm||""}" onchange="calcParada()"></div>
      <div class="field"><label class="f">Máquina voltou em (data e hora)</label><input type="datetime-local" id="cVoltou" value="${o.retornoEm||""}" onchange="calcParada()"></div>
    </div>
    <div class="field"><label class="f">Peças / materiais utilizados</label><input id="cPecas" value="${o.pecas||""}" placeholder="Ex.: Rolamento 6204 (2), Correia A-50 (1)"></div>
    <div class="form-grid">
      <div class="field"><label class="f">Tempo de trabalho (horas)</label><input type="number" step="0.5" id="cTempo" value="${o.tempoGastoHoras||""}"></div>
      <div class="field"><label class="f">Tempo de parada (horas) <span class="hint">calculado das datas acima; pode ajustar</span></label><input type="number" step="0.5" id="cParada" value="${o.paradaHoras||""}"></div>
      <div class="field"><label class="f">Data de início</label><input type="date" id="cIni" value="${o.dataInicio||todayStr()}"></div>
      <div class="field"><label class="f">Data de conclusão</label><input type="date" id="cFim" value="${o.dataConclusao||todayStr()}"></div>
    </div>
  `,[{label:"✅ Concluir OS",cls:"ok",fn:()=>{
      const serv=val("cServ");if(!serv){toast("Descreva o serviço executado.");return false;}
      o.servicoExecutado=serv;o.pecas=val("cPecas");
      o.sintoma=val("cSint")||"";o.causa=val("cCausa")||"";o.intervencao=val("cInterv")||"";
      o.paradaEm=val("cParou")||null;o.retornoEm=val("cVoltou")||null;
      o.tempoGastoHoras=parseFloat(val("cTempo"))||null;o.paradaHoras=parseFloat(val("cParada"))||null;
      o.dataInicio=val("cIni")||o.dataInicio;o.dataConclusao=val("cFim")||todayStr();o.status="concluida";
      addHist(o,"OS concluída");save();toast("✅ OS concluída!");render();return true;
    }},{label:"Salvar sem concluir",cls:"",fn:()=>{
      o.servicoExecutado=val("cServ");o.pecas=val("cPecas");
      o.sintoma=val("cSint")||"";o.causa=val("cCausa")||"";o.intervencao=val("cInterv")||"";
      o.paradaEm=val("cParou")||null;o.retornoEm=val("cVoltou")||null;
      o.tempoGastoHoras=parseFloat(val("cTempo"))||null;o.paradaHoras=parseFloat(val("cParada"))||null;o.dataInicio=val("cIni")||o.dataInicio;
      save();toast("Progresso salvo.");return true;
    }}]);
}

/* ===================== IMPRESSÃO DA FOLHA ===================== */
function imprimirOS(id){
  const o=ordemById(id);const e=equip(o.equipamentoId);const t=o.tecnicoId?tec(o.tecnicoId):null;
  document.getElementById("printArea").innerHTML=`<div class="sheet">
    <div class="sh"><div><img src="logo-rei.png" style="height:46px;display:block" onerror="this.style.display='none'"><h2 style="margin-top:6px">ORDEM DE SERVIÇO — MANUTENÇÃO</h2><div>Nº <b>${o.numero}</b></div></div>
      <div style="text-align:right"><b>REI Auto Parts</b><br>Emissão: ${fmt(todayStr())} às ${new Date().toTimeString().slice(0,5)}</div></div>
    <table><tr><th style="width:25%">Equipamento</th><td>${e.tag} · ${e.nome}</td><th style="width:15%">Setor</th><td>${o.setorSolicitante||e.setor}</td></tr>
      <tr><th>Categoria</th><td>${o.categoria?CATEGORIAS[o.categoria]:"________"}</td><th>Prioridade</th><td>${PRIORIDADES[o.prioridade]}</td></tr>
      <tr><th>Tipo</th><td>${TIPOS[o.tipo]}</td><th>Prazo</th><td>${o.prazo?fmt(o.prazo):"________"}</td></tr>
      <tr><th>Sintoma</th><td>${o.sintoma?catLbl("sintomas",o.sintoma):"________"}</td><th>Causa</th><td>${o.causa?catLbl("causas",o.causa):"________"}</td></tr>
      <tr><th>Intervenção</th><td>${o.intervencao?catLbl("intervencoes",o.intervencao):"________"}</td><th>Parada / Retorno</th><td>${o.paradaEm?fmtDT(o.paradaEm)+" → "+fmtDT(o.retornoEm):"____/____/____ __:__ → ____/____/____ __:__"}</td></tr>
      <tr><th>Solicitante</th><td>${o.solicitante||""}</td><th>Aberta em</th><td>${fmt(o.dataAbertura)}</td></tr>
      <tr><th>Responsável</th><td colspan="3">${t?t.nome+" — "+CATEGORIAS[t.equipe]:"________________________"}</td></tr></table>
    <p style="margin:10px 0 2px"><b>Problema reportado:</b></p><div class="blk" style="min-height:40px">${o.descricaoProblema}</div>
    ${o.observacoesGestor?`<p style="margin:10px 0 2px"><b>Observações do gestor:</b></p><div class="blk" style="min-height:30px">${o.observacoesGestor}</div>`:""}
    <p style="margin:14px 0 2px"><b>SERVIÇO EXECUTADO</b> (preencher):</p><div class="blk">${o.servicoExecutado||""}</div>
    <table style="margin-top:10px"><tr><th style="width:50%">Peças / materiais utilizados</th><th style="width:25%">Tempo de trabalho (h)</th><th style="width:25%">Parada (h)</th></tr>
      <tr><td style="height:40px">${o.pecas||""}</td><td>${o.tempoGastoHoras||""}</td><td>${o.paradaHoras||""}</td></tr></table>
    <div class="sign"><div>Técnico responsável</div><div>Líder da equipa</div><div>Gestor da Manutenção</div></div>
  </div>`;
  window.print();
}

/* ===================== MODAL GENÉRICO ===================== */
function val(id){const el=document.getElementById(id);return el?el.value.trim():"";}
function openModal(title,bodyHTML,actions,extraCls){
  const root=document.getElementById("modalRoot");
  const btns=(actions||[]).map((a,i)=>`<button class="btn ${a.cls||''}" data-i="${i}">${a.label}</button>`).join("");
  root.innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal ${extraCls||''}">
    <div class="mh"><h2>${title}</h2><button class="x" onclick="closeModal()">×</button></div>
    <div class="mb">${bodyHTML}</div>
    <div class="mf"><button class="btn" onclick="closeModal()">Fechar</button>${btns}</div>
  </div></div>`;
  (actions||[]).forEach((a,i)=>{root.querySelector(`[data-i="${i}"]`).onclick=()=>{const keepOpen=a.fn();if(keepOpen!==false)closeModal();};});
}
function closeModal(){document.getElementById("modalRoot").innerHTML="";}

/* ===================== INÍCIO ===================== */
document.getElementById("yr").textContent=new Date().getFullYear();
load();
render();
</script>
